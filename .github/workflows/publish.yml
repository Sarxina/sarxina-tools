name: Release

# Stub workflow that delegates to the reusable release workflow defined
# in this same repo. sarxina-tools doesn't have its own test suite yet,
# so `run_tests: false`. Build runs `npm run build`. Publishes to npm.
on:
  push:
    branches: [main]

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      npm_publish: true
      install_command: corepack enable && pnpm install --frozen-lockfile
      build_command: pnpm build
      run_tests: false
